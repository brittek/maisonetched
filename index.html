<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<title>Maison Etched | Sydney Atelier</title>
	<meta name="description" content="Maison Etched: A refined digital presence for the modern Sydney atelier.">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Instrument+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

	<script src="https://cdn.tailwindcss.com"></script>
	<script>
		tailwind.config = {
			theme: {
				extend: {
					colors: {
						bone: '#E7E6DE',
						burgundy: '#470908',
						ink: '#1A1A1A', 
						steel: 'rgba(26, 26, 26, 0.04)' 
					},
					fontFamily: {
						sans:['"Instrument Sans"', 'sans-serif'],
						serif: ['"Cormorant Garamond"', 'serif']
					}
				}
			}
		}
	</script>

	<style type="text/tailwindcss">
		@layer base {
			body {
				@apply bg-bone text-ink antialiased selection:bg-burgundy selection:text-white overflow-x-hidden;
			}
			.caption {
				@apply text-[9px] sm:text-[10px] font-semibold uppercase tracking-[0.35em] leading-none font-sans text-ink/60;
			}
		}

		.grid-overlay {
			background-image:
				linear-gradient(to right, rgba(0, 0, 0, 0.025) 1px, transparent 1px),
				linear-gradient(to bottom, rgba(0, 0, 0, 0.025) 1px, transparent 1px);
			background-size: clamp(40px, 8vw, 60px) clamp(40px, 8vw, 60px);
			mask-image: radial-gradient(circle at center, black 25%, transparent 90%);
			-webkit-mask-image: radial-gradient(circle at center, black 25%, transparent 90%);
		}

		/* Hardware-accelerated Entrance Animations */
		@keyframes logoEntrance {
			0% { opacity: 0; transform: scale(0.95) translateY(10px); filter: brightness(0.9); }
			100% { opacity: 1; transform: scale(1) translateY(0); filter: brightness(1); }
		}

		.animate-logo {
			animation: logoEntrance 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
			will-change: transform, opacity, filter;
		}

		.animate-content {
			opacity: 0;
			animation: fadeInUp 1.4s 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
			will-change: transform, opacity;
		}

		@keyframes fadeInUp {
			from { opacity: 0; transform: translateY(20px); }
			to { opacity: 1; transform: translateY(0); }
		}
	</style>
</head>

<body class="min-h-[100dvh] flex flex-col items-center justify-center relative pt-[max(1.5rem,env(safe-area-inset-top))] pb-[max(1.5rem,env(safe-area-inset-bottom))] px-[max(1.5rem,env(safe-area-inset-left))] pr-[max(1.5rem,env(safe-area-inset-right))] md:p-12">

	<!-- Grid Texture Background -->
	<div class="absolute inset-0 pointer-events-none grid-overlay z-0" aria-hidden="true"></div>

	<!-- Desktop Framing Elements -->
	<div class="absolute inset-6 md:inset-8 border border-steel pointer-events-none hidden md:block z-0" aria-hidden="true"></div>

	<!-- Main Content Container -->
	<main class="relative z-10 w-full max-w-5xl flex flex-col items-center text-center">

		<!-- Header, Logo & Email -->
		<header class="w-full flex flex-col items-center mb-14 sm:mb-16 md:mb-24">
			
            <!-- Logo -->
            <div class="animate-logo w-5/6 sm:w-full max-w-[280px] sm:max-w-[320px] md:max-w-[480px] mb-8 sm:mb-10">
				<img src="https://assets.codepen.io/9806267/e2470bc5-9303-410d-91dd-63301905514a.jpeg" alt="Maison Etched Logo" class="w-full h-auto object-contain">
			</div>

            <!-- Email / Primary Focal Point -->
            <div class="animate-content flex flex-col items-center space-y-3 mb-10 sm:mb-12 w-full px-4">
                <p class="caption">Enquiries</p>
                <a href="mailto:hello@maisonetched.com" class="block text-xl sm:text-2xl md:text-[2rem] font-serif italic hover:text-burgundy transition-colors duration-500 break-words text-ink">
                    hello@maisonetched.com
                </a>
            </div>

            <!-- Separator -->
			<div class="animate-content flex items-center justify-center gap-4 sm:gap-6 md:gap-10 w-full px-4">
				<span class="h-[0.5px] w-6 sm:w-10 md:w-20 shrink bg-ink/10"></span>
				<span class="caption text-burgundy whitespace-nowrap">Sydney Atelier</span>
				<span class="h-[0.5px] w-6 sm:w-10 md:w-20 shrink bg-ink/10"></span>
			</div>

		</header>

		<!-- Article / Status Message -->
		<article class="animate-content space-y-6 sm:space-y-8 max-w-xl mx-auto px-4 sm:px-6 w-full">
			<h2 class="text-[1.35rem] sm:text-2xl md:text-3xl font-serif italic font-light tracking-tight text-ink/90 leading-snug">
				Our digital presence is currently being refined to serve the modern presence.
			</h2>
			<div class="space-y-2">
				<p class="caption normal-case italic font-normal tracking-[0.2em] text-ink/50 leading-relaxed">
					Active for bespoke commissions and collaborations.
				</p>
				<p class="caption normal-case italic font-normal tracking-[0.2em] text-ink/40 leading-relaxed">
					The atelier remains active by appointment.
				</p>
			</div>
		</article>

		<!-- Footer Details -->
		<footer class="animate-content pt-12 sm:pt-16 mt-14 sm:mt-16 border-t border-ink/5 w-full max-w-2xl px-4 sm:px-8">
			<div class="flex flex-col items-center justify-center text-center">

				<!-- Affiliation -->
				<div class="space-y-3 sm:space-y-4 flex flex-col items-center">
					<p class="caption">Affiliation</p>
					<p class="text-[9px] sm:text-[10px] md:text-xs font-semibold uppercase tracking-[0.3em] leading-relaxed text-ink/80 flex flex-col items-center">
						<span class="mb-1.5 md:mb-2">A Company by</span>
						<a href="https://etched.media" target="_blank" rel="noopener" class="inline-block border-b border-burgundy/20 hover:border-burgundy hover:text-burgundy transition-colors pb-0.5">
							Etched Media
						</a>
					</p>
				</div>

			</div>
		</footer>
	</main>

	<!-- Credits -->
	<aside class="absolute bottom-[max(1rem,env(safe-area-inset-bottom))] md:bottom-8 w-full flex flex-col items-center opacity-30 px-4 text-center">
		<p class="caption text-[7px] tracking-[0.6em]">Site by Brittek Digital</p>
	</aside>

	<!-- Desktop Corner Accents -->
	<div class="absolute top-10 left-10 w-10 h-10 border-t border-l border-steel/80 hidden md:block"></div>
	<div class="absolute bottom-10 right-10 w-10 h-10 border-b border-r border-steel/80 hidden md:block"></div>

</body>

</html>
